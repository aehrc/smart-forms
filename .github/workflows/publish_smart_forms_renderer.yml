name: Publish @aehrc/smart-forms-renderer

on:
  release:
    types: [published]

jobs:
  build-test-lint:
    if: startsWith(github.ref_name, 'v')
    uses: ./.github/workflows/build_test_lint.yml

  publish:
    name: Publish to npm
    needs: build-test-lint
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build dependencies
        run: |
          npm run build -w packages/sdc-populate
          npm run build -w packages/sdc-template-extract
      - name: Build
        run: npm run build -w packages/smart-forms-renderer
      - name: Publish
        run: npm publish --provenance --access public
        working-directory: packages/smart-forms-renderer
